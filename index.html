<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./javascript.js" defer></script>
</head>
<body>
    <dialog id="bookDialog">
        <form id="bookForm">
            <p>Add a book
            <label>Title
                <input type="text" name="title" required />
            </label>
            <label>Author
                <input type="text" name="author" required />
            </label>
            <label>Pages
                <input type="text" name=pages required />
            </label>
            <label>Read?
                <input type="checkbox" name="read" required />
            </label>
            </p>
            <div>
            <button id="cancelBtn" value="cancel" formmethod="dialog">Cancel</button>
            <button id="confirmBtn" value="default">Confirm</button>
            </div>
        </form>
    </dialog>

    <H1>My Little Library</H1>
    <button id="showBookDialog">Add A Book</button>
    <table border="1">
        <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Pages</th>
            <th>Read?</th>
            </tr>
        </thead>
        <tbody id="book-data">
        </tbody>
    </table>

</body>
</html>
